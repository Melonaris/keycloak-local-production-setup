events {
}

http {
    server {
        listen 443 ssl;
        server_name auth.localhost;

        ssl_certificate /etc/nginx/certs/auth.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/auth.localhost-key.pem;

        location = / {
            return 302 /admin/master/console/;
        }

        location / {
            proxy_pass http://identity-provider:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }


        # location /realms {
        #     proxy_pass http://identity-provider:8080/realms/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto https;
        # }
        # location / {
        #     return 404;
        # }
    }

    server {
        listen 443 ssl;
        server_name auth-admin.localhost;

        ssl_certificate /etc/nginx/certs/auth.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/auth.localhost-key.pem;

        real_ip_header X-Real-IP;
        real_ip_recursive on;

        allow 10.173.243.0/24;
        deny all;

        location / {
            proxy_pass http://identity-provider:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}