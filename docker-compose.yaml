networks:
  keycloak_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24

services:
  keycloak-init:
    image: alpine:3.19
    container_name: keycloak_init
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - keycloak_network
    volumes:
      - ./keycloak-initialization.sh:/opt/keycloak/keycloak-initialization.sh
      - keycloak_cli:/opt/keycloak
    environment:
      - KEYCLOAK_USERNAME=${KEYCLOAK_USERNAME}
      - KEYCLOAK_PASSWORD=${KEYCLOAK_PASSWORD}
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash curl openjdk17-jre-headless && /opt/keycloak/keycloak-initialization.sh"]

  nginx:
    image: nginx:1.28.2
    container_name: nginx_container
    ports:
      - "443:443"
    networks:
      - keycloak_network
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
        
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.6
    container_name: keycloak_container
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres/keycloak
      - KC_DB_USERNAME=${POSTGRES_KEYCLOAK_USERNAME}
      - KC_DB_PASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
      - KC_HOSTNAME=auth.localhost
    networks:
      - keycloak_network
    volumes:
      - keycloak_cli:/opt/keycloak
    command:
      - start
      - --http-enabled=true
      - --proxy-headers=xforwarded
      - --proxy-trusted-addresses=172.16.0.0/24
      - --bootstrap-admin-username=keycloak_temp_admin
      - --bootstrap-admin-password=${KEYCLOAK_PASSWORD}
      - --health-enabled=true
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    container_name: postgres_container
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${POSTGRES_KEYCLOAK_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
      - PGPASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
    networks:
      - keycloak_network
    volumes:
      - keycloak_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USERNAME} -d keycloak -h localhost"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  keycloak_data:
  keycloak_cli: