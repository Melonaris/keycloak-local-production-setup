networks:
  keycloak_network:
    driver: bridge
  vpn_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24

services:
  vpn_server:
    image: lscr.io/linuxserver/wireguard:1.0.20250521
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
      - SERVERURL=vpn.localhost
      - SERVERPORT=58999
      - PEERS=10
      - PEERDNS=auto
      - ALLOWEDIPS=10.173.243.0/24
      - INTERNAL_SUBNET=10.173.243.0/24
    entrypoint: ["/bin/sh", "-c", "mkdir -p /config/coredns && cp /Corefile /config/coredns/Corefile && exec /init"]
    volumes:
      - wireguard:/config
      - ./dns-hosts-config:/Corefile
    ports:
      - "58999:58999/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - vpn_network

  keycloak-initializer:
    image: alpine:3.19
    depends_on:
      reverse-proxy:
        condition: service_started
    networks:
      - keycloak_network
    volumes:
      - ./keycloak-initialization.sh:/opt/keycloak/keycloak-initialization.sh
      - keycloak_cli:/opt/keycloak
    environment:
      - KEYCLOAK_USERNAME=${KEYCLOAK_USERNAME}
      - KEYCLOAK_PASSWORD=${KEYCLOAK_PASSWORD}
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash curl openjdk17-jre-headless && /opt/keycloak/keycloak-initialization.sh"]

  reverse-proxy:
    image: nginx:1.28.2
    ports:
      - "443:443"
    networks:
      - keycloak_network
      - vpn_network
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      identity-provider:
        condition: service_started

  identity-provider:
    image: quay.io/keycloak/keycloak:26.4.6
    depends_on:
      identity-provider-database:
        condition: service_healthy
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://identity-provider-database/keycloak
      - KC_DB_USERNAME=${POSTGRES_KEYCLOAK_USERNAME}
      - KC_DB_PASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
      - KC_HOSTNAME=auth.localhost
    networks:
      - keycloak_network
    ports:
      - "58080:8080"
      - "59000:9000"
    volumes:
      - keycloak_cli:/opt/keycloak
    command:
      - start
      - --http-enabled=true
      - --http-host=0.0.0.0
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --proxy-trusted-addresses=172.16.0.0/24
      - --bootstrap-admin-username=keycloak_temp_admin
      - --bootstrap-admin-password=${KEYCLOAK_PASSWORD}
      - --health-enabled=true
    restart: unless-stopped

  identity-provider-database:
    image: postgres:18.3
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${POSTGRES_KEYCLOAK_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
      - PGPASSWORD=${POSTGRES_KEYCLOAK_PASSWORD}
    networks:
      - keycloak_network
    volumes:
      - keycloak_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USERNAME} -d keycloak -h localhost"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  keycloak_data:
  keycloak_cli:
  wireguard: